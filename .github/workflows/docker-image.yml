name: Build Docker Images

on:
  push:
    branches:
      - main
      - master
# 
permissions:
  contents: read
  packages: write

jobs:
  build-webapp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Webapp
        uses: docker/build-push-action@v7
        with:
          context: ./webapp
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/geoglify-webapp:latest
            ghcr.io/${{ github.repository_owner }}/geoglify-webapp:${{ github.sha }}

  build-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Database
        uses: docker/build-push-action@v7
        with:
          context: ./database
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/geoglify-database:latest
            ghcr.io/${{ github.repository_owner }}/geoglify-database:${{ github.sha }}
