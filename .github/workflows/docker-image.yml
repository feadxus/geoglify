name: Build Docker Images And Upload To Google Drive

on:
  push:
    branches:
      - main
      - master
# 
jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y gzip xz-utils curl

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          # 建议:如果 rclone.conf 包含敏感 Token,推荐将其存入 GitHub Secrets
          # 然后使用 echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf
          cp rclone.conf ~/.config/rclone/

      - name: Verify rclone
        run: |
          rclone version
          rclone listremotes

      - name: Build Webapp Image
        run: |
          docker build \
            -t geoglify-webapp:latest \
            ./webapp

      - name: Build Database Image
        run: |
          docker build \
            -t geoglify-database:latest \
            ./database

      - name: Show Images
        run: |
          docker images

      - name: Save Docker Images
        run: |
          docker save \
            geoglify-webapp:latest \
            geoglify-database:latest \
            -o all_images.tar

      - name: Compress Images
        run: |
          xz -T0 -9e all_images.tar

      - name: Show Archive Size
        run: |
          ls -lh all_images.tar.xz

      - name: Create Google Drive Folder
        run: |
          rclone mkdir Google:/backup || true

      - name: Upload To Google Drive
        run: |
          rclone copy \
            all_images.tar.xz \
            Google:/backup/

      - name: Verify Upload
        run: |
          rclone lsf Google:/backup/
